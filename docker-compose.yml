services:
  train:
    # Phase 2: LeRobot training + ZMQ client connecting to sim on host
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ZMQ_SIM_ADDR: ${ZMQ_SIM_ADDR:-tcp://host.docker.internal:5555}
      HF_TOKEN: ${HF_TOKEN:-}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - .:/workspace:rw
    runtime: nvidia
    shm_size: "8gb"
    stdin_open: true
    tty: true
