services:
  sim:
    build:
      context: sim
      dockerfile: Dockerfile
    environment:
      ACCEPT_EULA: "Y"
      OMNI_KIT_ACCEPT_EULA: "YES"
      DISPLAY: ${DISPLAY:-:0}
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "all"
    volumes:
      - ./sim:/workspace/sim:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    runtime: nvidia
    network_mode: host
    shm_size: "4gb"
    stdin_open: true
    tty: true

  lerobot:
    build:
      context: train
      dockerfile: Dockerfile
    environment:
      SIM_HOST: localhost
      SIM_PORT: "5555"
    volumes:
      - ./train:/workspace/train:rw
    network_mode: host
    depends_on:
      - sim
    stdin_open: true
    tty: true

  dataset-pipeline:
    build:
      context: dataset-pipeline
      dockerfile: Dockerfile
    environment:
      DATASET_PIPELINE_WITH_CONVERT: "1"
    volumes:
      - ./dataset-pipeline:/workspace/dataset-pipeline:rw
    network_mode: host
    stdin_open: true
    tty: true

