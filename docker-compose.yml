services:
  sim:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DISPLAY: ${DISPLAY:-:0}
      HF_ENV_REPO: ${HF_ENV_REPO:-AshDash93/toy-sorting-env}
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "all"
      ACCEPT_EULA: "Y"
      OMNI_KIT_ACCEPT_EULA: "YES"
    volumes:
      - .:/workspace:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - assets_cache:/workspace/assets/toy_sorting
    runtime: nvidia
    shm_size: "8gb"
    stdin_open: true
    tty: true

  train:
    # Phase 2 stub — not functional yet.
    # Will become: lerobot training + ZMQ client connecting to sim:5555
    image: python:3.12-slim
    command: echo "Train container: Phase 2 not yet implemented"
    environment:
      ZMQ_SIM_ADDR: "tcp://sim:5555"

volumes:
  assets_cache:
