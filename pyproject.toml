[project]
name = "manipulator-isaac-learning"
version = "0.1.0"
description = "Simulation-first manipulation learning with LeRobot + LeIsaac EnvHub"
readme = "README.md"
requires-python = "==3.11.*"
dependencies = [
    "numpy==1.26.0",
]

[project.optional-dependencies]
sim = [
    "torch==2.7.0",
    "torchvision==0.22.0",
    "leisaac[isaaclab] @ git+https://github.com/LightwheelAI/leisaac.git#subdirectory=source/leisaac",
]
train = [
    "torch==2.7.0",
    "torchvision==0.22.0",
    "lerobot==0.4.1",
]

[tool.uv]
index-strategy = "unsafe-best-match"
environments = [
  "sys_platform == 'linux' and implementation_name == 'cpython' and python_version == '3.11'",
  "sys_platform == 'win32' and implementation_name == 'cpython' and python_version == '3.11'"
]
override-dependencies = [
  "pywin32==306; sys_platform == 'win32'",
]
extra-build-dependencies = { isaacsim = ["wheel_stub"], flatdict = ["setuptools<70"] }

[[tool.uv.index]]
url = "https://pypi.nvidia.com/"

[[tool.uv.index]]
url = "https://download.pytorch.org/whl/cu128"

[build-system]
requires = ["uv_build>=0.8.21,<0.9.0"]
build-backend = "uv_build"
